name: Update Diete
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: |
          pip install gspread google-auth seleniumbase playwright beautifulsoup4 lxml
          playwright install chromium
      - name: Installer les libs système pour Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 xvfb
      - name: Lancer Xvfb
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Lancer le script
        run: python main.py
        env:
          DISPLAY: :99
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MFP_EMAIL: ${{ secrets.MFP_EMAIL }}
          MFP_PASSWORD: ${{ secrets.MFP_PASSWORD }}
