name: MyFitnessPal Sync

on:
  workflow_dispatch: # Permet de lancer le script manuellement

jobs:
  run-sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Accélère les prochains lancements

      - name: Installer les dépendances
        run: |
          pip install playwright seleniumbase beautifulsoup4 lxml gspread google-auth
          # Installe le navigateur
          python -m playwright install chromium
          # Installe les librairies système nécessaires (fix pour l'erreur précédente)
          sudo $(which python) -m playwright install-deps chromium

      - name: Exécuter le script MyFitnessPal
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MFP_EMAIL: ${{ secrets.MFP_EMAIL }}
          MFP_PASSWORD: ${{ secrets.MFP_PASSWORD }}
        run: python mfp_automation.py

      - name: Sauvegarder les screenshots (Debug)
        if: always() # S'exécute même si le script plante
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-debug
          path: screenshot_*.png
          retention-days: 5
