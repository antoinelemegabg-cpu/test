name: MyFitnessPal Sync

on:
  workflow_dispatch: # Permet le lancement manuel depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run automation
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        # Note: Dans ce mode, il faudra modifier le script Python 
        # pour lire l'email/pass via des variables d'environnement au lieu de 'input'
        run: python mfp_automation.py
