name: MyFitnessPal Sync

on:
  workflow_dispatch: # Bouton manuel dans l'onglet Actions

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: |
          pip install playwright seleniumbase beautifulsoup4 lxml gspread google-auth
          playwright install chromium

      - name: Exécuter le script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MFP_EMAIL: ${{ secrets.MFP_EMAIL }}
          MFP_PASSWORD: ${{ secrets.MFP_PASSWORD }}
        run: python mfp_automation.py
